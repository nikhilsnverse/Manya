<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Manya Imaging and Diagnostic Point">
    <meta name="description" content="Chat with Manya AI Assistant for quick answers about diagnostic services, appointments, and healthcare information at Manya Diagnostic Center in Bilaspur.">
    <meta name="keywords" content="AI chatbot diagnostic center, healthcare assistant, Manya Imaging chat, Bilaspur diagnostic chat">
    <link rel="canonical" href="https://manyadiagonistic.in/chatbot">
    <title>AI Chat Assistant - Manya Imaging & Diagnostic Center Bilaspur</title>
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://manyadiagonistic.in/chatbot">
    <meta property="og:site_name" content="Manya Imaging & Diagnostic Point">
    <meta property="og:title" content="AI Chat Assistant - Manya Imaging & Diagnostic Center">
    <meta property="og:description" content="Chat with our AI assistant to get quick answers about diagnostic services, appointments, and healthcare information.">
    <meta property="og:image" content="https://manyadiagonistic.in/static/images/manyalogo.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AI Chat Assistant - Manya Imaging & Diagnostic Center">
    <meta name="twitter:description" content="Chat with our AI assistant for quick answers about diagnostic services.">
    <meta name="twitter:image" content="https://manyadiagonistic.in/static/images/manyalogo.png">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/manyalogo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { 
            height: 100vh; 
            overflow: hidden; 
            background-color: #f0f2f5; 
            margin: 0;
            padding: 0;
        }
        .chat-container { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            max-width: 100%;
            position: relative;
        }
        .chat-header { 
            background: #10b981; 
            color: white; 
            padding: 15px; 
            flex-shrink: 0;
        }
        .chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            padding-bottom: 10px;
        }
        .chat-input { 
            padding: 15px; 
            border-top: 1px solid #dee2e6; 
            flex-shrink: 0;
            background-color: white;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }
        .message { margin-bottom: 15px; }
        .message-sent { text-align: right; }
        .message-received { text-align: left; }
        .message-bubble { 
            display: inline-block; 
            padding: 10px 15px; 
            border-radius: 20px; 
            max-width: 70%;
            word-wrap: break-word;
        }
        .message-sent .message-bubble { 
            background: #10b981; 
            color: white; 
        }
        .message-received .message-bubble { 
            background: white; 
            border: 1px solid #dee2e6;
        }
        .typing-dots { display: flex; gap: 4px; }
        .typing-dots span { 
            width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            background: #6c757d; 
            animation: typing 1.4s infinite; 
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-10px); opacity: 1; } }
        
        @media (max-width: 768px) {
            body { height: 100vh; height: -webkit-fill-available; }
            .chat-container { height: 100vh; height: -webkit-fill-available; }
            .chat-header { padding: 10px; }
            .chat-messages { padding: 15px; padding-bottom: 5px; }
            .chat-input { padding: 10px; min-height: 60px; }
            .message-bubble { max-width: 85%; font-size: 14px; }
            .chat-header h5 { font-size: 16px; }
            .input-group { flex-wrap: nowrap; }
            #chatInput { font-size: 16px; min-height: 44px; }
            .btn { font-size: 14px; padding: 8px 12px; min-height: 44px; }
        }
        @media (max-width: 480px) {
            .chat-header { padding: 8px; }
            .chat-messages { padding: 10px; }
            .chat-input { padding: 8px; min-height: 50px; }
            .message-bubble { max-width: 90%; font-size: 13px; padding: 8px 12px; }
            .chat-header h5 { font-size: 14px; }
            .btn { font-size: 12px; padding: 6px 10px; min-height: 40px; }
            #chatInput { min-height: 40px; }
        }
        .input-group { width: 100%; }
        @supports (-webkit-touch-callout: none) {
            .chat-container { min-height: 100vh; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <header class="chat-header d-flex align-items-center">
            <button onclick="goBack()" class="btn btn-link text-white me-3 p-0 text-decoration-none" aria-label="Go back to previous page">
                <i class="bi bi-arrow-left fs-4"></i>
            </button>
            <h1 class="mb-0 h5"><i class="bi bi-robot me-2"></i>Manya AI Assistant</h1>
        </header>
        
        <main class="chat-messages" id="chatBox" role="log" aria-label="Chat messages" aria-live="polite">
            <div class="message message-received">
                <div class="message-bubble">Hello! I'm Manya AI Assistant. How can I help you today?</div>
            </div>
        </main>
        
        <div class="chat-input">
            <div class="input-group">
                <label for="chatInput" class="visually-hidden">Type your message</label>
                <input type="text" id="chatInput" class="form-control" placeholder="Type your message..." autocomplete="off" aria-label="Message input">
                <button class="btn btn-success" type="button" onclick="sendMessage()" id="sendButton" aria-label="Send message">
                    <i class="bi bi-send-fill"></i> <span class="d-none d-md-inline">Send</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const chatInput = document.getElementById('chatInput');

        function addMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            bubbleDiv.textContent = text;
            
            messageDiv.appendChild(bubbleDiv);
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message message-received';
            typingDiv.id = 'typing-indicator';
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            bubbleDiv.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
            
            typingDiv.appendChild(bubbleDiv);
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;
            
            addMessage(message, 'sent');
            chatInput.value = '';
            showTyping();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                removeTyping();
                
                if (response.ok) {
                    addMessage(data.response, 'received');
                } else {
                    addMessage('Error: ' + (data.error || 'Something went wrong'), 'received');
                }
            } catch (error) {
                removeTyping();
                addMessage('Connection error. Please try again.', 'received');
                console.error('Error:', error);
            }
        }

        chatInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        function goBack() {
            if (document.referrer && document.referrer.includes(window.location.hostname)) {
                window.history.back();
            } else {
                window.location.href = '/';
            }
        }

        window.addEventListener('load', function() {
            sessionStorage.setItem('chatReferrer', document.referrer);
        });
    </script>
</body>
</html>
